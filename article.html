  <script>
    const articles = {
      1: {
        title: "Designers don't need to code, until they do",
        date: "March 2026",
        body: `<p>There's a comfortable lie that floats around design circles: that knowing how to code is optional. A nice-to-have. A bonus. It isn't.</p>
        <p>I'm not saying every designer needs to ship production React. But understanding what's hard, what's easy, what costs three hours versus three minutes — that knowledge changes every conversation you have with an engineer.</p>
        <p>The moment I understood the DOM was the moment I stopped designing things that were technically beautiful and practically impossible. Not because engineers are lazy. Because I was asking for things that required restructuring the entire component tree to accommodate a two-pixel visual preference.</p>
        <p>Code literacy isn't about writing code. It's about designing with the grain of the material.</p>`
      },
      2: {
        title: "On being wrong loudly and often",
        date: "February 2026",
        body: `<p>I have a habit of stating half-formed opinions as if they're fully formed. This is, depending on who you ask, my worst or best professional quality.</p>
        <p>The worst version: I confidently advocate for a direction that turns out to be wrong, wasting everyone's time including my own.</p>
        <p>The best version: I say the thing nobody else is willing to say out loud, which opens up the conversation to actual disagreement, which is where all the good thinking happens.</p>
        <p>I've landed closer to the best version more often by being explicit about my confidence level. "I'm 60% sure about this" invites pushback. "Here's the answer" shuts the room down.</p>`
      },
      3: {
        title: "Tools I actually use (and why I judge people who don't)",
        date: "January 2026",
        body: `<p>I'm going to describe a pattern and you tell me if you recognize it. Someone complains about a problem — a process friction, a communication breakdown, an inefficiency — and when you ask if they've tried the tool that solves exactly that problem, they say: "Oh I've heard of it, I just haven't had time to learn it."</p>
        <p>This person has had time to complain. They have not had time to fix the thing they're complaining about. I find this baffling.</p>
        <p>None of the tools I rely on took more than an afternoon to learn at a useful level. That is the bar. An afternoon.</p>`
      },
      4: {
        title: "The dinner party problem: unsolicited design critique",
        date: "December 2025",
        body: `<p>The moment I realized I had fully become a product designer was not when I shipped my first feature. It was when I was at dinner and couldn't stop thinking about why the restaurant's menu app used a carousel for the categories instead of a tab bar.</p>
        <p>Nobody asked. The food was good. The conversation was fine. And I was internally writing a Jira ticket.</p>
        <p>There is no cure. You learn to suppress the commentary. You do not always succeed. Your friends tolerate you. This is the deal.</p>`
      },
      5: {
        title: 'Why "ship it" is both good and terrible advice',
        date: "November 2025",
        body: `<p>"Ship it" is good advice when the problem is paralysis. When the team has been refining the same design for six weeks, when every conversation reopens already-closed decisions, when perfect has become the enemy of done — yes. Ship it.</p>
        <p>"Ship it" is terrible advice when the thing you're about to ship is wrong. Not imperfect. Wrong. Wrong premise, wrong user, wrong problem solved entirely.</p>
        <p>The hard part is telling the difference. That distinction is most of the job.</p>`
      },
      6: {
        title: "What product design borrowed from therapy",
        date: "October 2025",
        body: `<p>A good therapist doesn't tell you what to feel. They ask questions until you tell yourself. A good designer doesn't tell users what they want. They create conditions where users can show you.</p>
        <p>Both disciplines require sitting with discomfort. Not jumping to solutions. Resisting the urge to fix before you understand.</p>
        <p>I'm not saying designers are therapists. I'm saying the cognitive posture is surprisingly similar.</p>`
      },
      7: {
        title: "Against vibes-based roadmaps",
        date: "September 2025",
        body: `<p>A vibes-based roadmap is one where the prioritization logic, if you trace it back far enough, ends at "the founder really cares about this" or "we've been talking about it for a while so it feels important."</p>
        <p>These roadmaps are more common than anyone admits. They get dressed up in the language of strategy but the actual inputs are vibes.</p>
        <p>The fix is one honest question per roadmap item: what would convince us this is the wrong thing to build right now? If nobody can answer that, the item isn't prioritized. It's assumed.</p>`
      },
      8: {
        title: "Self-awareness as a design skill",
        date: "August 2025",
        body: `<p>The designers I've seen do the most damage were not the ones who lacked skills. They were the ones who lacked self-awareness about where their instincts were reliable and where they weren't.</p>
        <p>Everyone has design opinions. The difference between an opinion and a skill is being able to say "I don't know if I'm right about this, let's test it" and meaning it.</p>
        <p>Self-awareness in design isn't humility for its own sake. It's precision.</p>`
      },
      9: {
        title: "The myth of the objective user",
        date: "July 2025",
        body: `<p>There is no objective user. There is no view from nowhere. Every research method selects for certain kinds of people, certain kinds of contexts, certain kinds of feedback.</p>
        <p>This doesn't mean user research is useless. It means treating any single study as definitive is the mistake. You're collecting evidence, not discovering truth.</p>
        <p>The practical implication: when someone says "users want X" based on one round of interviews, the right question is always "which users, in what context, saying what, to whom?"</p>`
      }
    };
